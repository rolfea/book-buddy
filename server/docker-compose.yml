version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookbuddy
      POSTGRES_PASSWORD: bookbuddy
      POSTGRES_DB: bookbuddy
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookbuddy"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
